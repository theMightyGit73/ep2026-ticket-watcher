name: EP2026 Ticket Watcher

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'check = print result only (no email) | test = send test email'
        required: false
        default: 'check'
        type: choice
        options:
          - check
          - test

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install cloudscraper
      - name: Run ticket checker
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
            if [ "$MODE" = "test" ]; then
              echo "Running TEST EMAIL mode..."
              python ticket_checker.py --test
            else
              echo "Running CHECK mode (print result, no email)..."
              python ticket_checker.py --check
            fi
          else
            echo "Scheduled run — checking Ticketmaster..."
            python ticket_checker.py
          fi
